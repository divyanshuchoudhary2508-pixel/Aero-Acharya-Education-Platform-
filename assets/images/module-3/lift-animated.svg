<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wing { fill: #f8f5ed; stroke: #175679; stroke-width: 4; }
      .flow-path { fill: none; stroke: #2278a9; stroke-width: 3; opacity: 0.15; }
      .particle {
        fill: none;
        stroke: #2278a9;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 15 800; /* Short dash, huge gap so it looks like a single particle */
        animation: flow linear infinite;
      }
      .fast { animation-duration: 1.2s; stroke: #175679; stroke-width: 4; }
      .slow { animation-duration: 2.2s; }
      
      @keyframes flow {
        from { stroke-dashoffset: 800; }
        to { stroke-dashoffset: 0; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0a141c" />
    </marker>
  </defs>

  <!-- Flow paths (invisible guide rails, slightly visible as a faint trail) -->
  <path id="path-top1" class="flow-path" d="M 0,200 C 150,200 150,50 400,50 C 650,50 650,200 800,200" />
  <path id="path-top2" class="flow-path" d="M 0,230 C 120,230 180,100 400,100 C 620,100 680,210 800,210" />
  
  <path id="path-bot1" class="flow-path" d="M 0,270 C 200,270 200,290 400,290 C 600,290 600,240 800,240" />
  <path id="path-bot2" class="flow-path" d="M 0,320 C 200,320 200,330 400,330 C 600,330 600,280 800,280" />

  <!-- Animated Particles over the top (fast) -->
  <path class="particle fast" d="M 0,200 C 150,200 150,50 400,50 C 650,50 650,200 800,200" style="animation-delay: 0s" />
  <path class="particle fast" d="M 0,200 C 150,200 150,50 400,50 C 650,50 650,200 800,200" style="animation-delay: -0.6s" />
  
  <path class="particle fast" d="M 0,230 C 120,230 180,100 400,100 C 620,100 680,210 800,210" style="animation-delay: -0.3s" />
  <path class="particle fast" d="M 0,230 C 120,230 180,100 400,100 C 620,100 680,210 800,210" style="animation-delay: -0.9s" />

  <!-- Animated Particles under the bottom (slow) -->
  <path class="particle slow" d="M 0,270 C 200,270 200,290 400,290 C 600,290 600,240 800,240" style="animation-delay: 0s" />
  <path class="particle slow" d="M 0,270 C 200,270 200,290 400,290 C 600,290 600,240 800,240" style="animation-delay: -1.1s" />
  
  <path class="particle slow" d="M 0,320 C 200,320 200,330 400,330 C 600,330 600,280 800,280" style="animation-delay: -0.5s" />
  <path class="particle slow" d="M 0,320 C 200,320 200,330 400,330 C 600,330 600,280 800,280" style="animation-delay: -1.6s" />

  <!-- Airfoil Geometry -->
  <!-- A beautiful teardrop shape with a curved top and flatter bottom -->
  <path class="wing" d="M 150,250 C 150,150 350,120 650,220 C 660,223 660,227 650,230 C 350,280 150,300 150,250 Z" />
  
  <!-- Text Labels -->
  <text x="400" y="70" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#175679" text-anchor="middle">LOW PRESSURE / FAST AIR</text>
  <text x="400" y="320" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#5c6d79" text-anchor="middle">HIGH PRESSURE / SLOW AIR</text>
  <text x="400" y="210" font-family="Inter, sans-serif" font-weight="700" font-size="24" fill="#0a141c" text-anchor="middle">LIFT</text>
  <path d="M 400,190 L 400,130" stroke="#0a141c" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
